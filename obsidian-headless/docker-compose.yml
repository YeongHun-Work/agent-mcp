services:
  obsidian-headless:
    image: obsidian/headless:latest # 2026년 기준 공식 CLI/Sync 이미지 (가정)
    container_name: obsidian-headless
    restart: unless-stopped
    environment:
      - OBSIDIAN_SYNC_EMAIL=${OBSIDIAN_SYNC_EMAIL}
      - OBSIDIAN_SYNC_PASSWORD=${OBSIDIAN_SYNC_PASSWORD}
      # 필요 시 PUID, PGID 설정으로 권한 문제 방지
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Seoul
    volumes:
      # 호스트의 /data/workspace/obsidian/ 경로를 컨테이너 내부의 /obsidian 경로로 마운트
      - /data/workspace/obsidian/:/obsidian/
      # 플러그인 및 CLI 설정 보존을 위한 config 마운트
      - ./config:/root/.config/obsidian
    ports:
      # Local REST API 기본 포트 (27123) 외부 개방
      - "27123:27123"
